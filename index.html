<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:64px}
.header{position:sticky;top:0;background:#0f172a;z-index:10;border-bottom:1px solid #1e293b;padding:12px 16px}
.btn{background:#334155;color:#e2e8f0;border:none;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer;font-weight:500;-webkit-appearance:none}
.btn-blue{background:#3b82f6}.btn-green{background:#22c55e}.btn-red{background:#dc2626}
.input{background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:10px 12px;font-size:14px;width:100%;outline:none;-webkit-appearance:none}
.input:focus{border-color:#3b82f6}
.card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:6px}
.macro-row{display:flex;gap:10px}
.macro-col{flex:1;min-width:0}
.macro-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;color:#94a3b8}
.macro-val{color:#e2e8f0}.macro-val.over{color:#f87171}
.macro-track{height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
.macro-fill{height:100%;border-radius:3px;transition:width 0.3s}
.big-num{text-align:center;padding:20px 16px 8px}
.big-num .num{font-size:42px;font-weight:800}
.big-num .sub{font-size:13px;color:#64748b}
.empty{color:#475569;text-align:center;padding:32px}
.food-meta{font-size:12px;color:#94a3b8}
.entry-row{display:flex;align-items:center;gap:10px}
.entry-kcal{font-weight:700;font-size:14px;color:#f59e0b;min-width:50px;text-align:right}
.remove-btn{background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;padding:0 4px}
.edit-btn{background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;padding:2px 6px}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.date-center{text-align:center}
.date-title{font-weight:700;font-size:16px}
.today-btn{background:none;border:none;color:#3b82f6;font-size:12px;cursor:pointer;padding:0}
.bottom-actions{padding:12px 16px 8px;display:flex;gap:8px}
.bottom-actions .btn{flex:1;padding:14px;font-size:15px}
.bottom-actions .btn:last-child{flex:0}
.nav-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.nav-title{font-weight:600;font-size:16px}
.search-row{display:flex;gap:8px}
.search-row .input{flex:1}
.food-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.food-name{font-weight:600;font-size:14px}
.add-row{display:flex;gap:8px;align-items:center}
.add-row .input{width:70px;padding:6px 8px;font-size:13px;text-align:center}
.add-row .g-label{font-size:12px;color:#64748b}
.add-row .kcal-preview{flex:1;font-size:12px;color:#94a3b8;text-align:right}
.form-section{padding:16px;display:flex;flex-direction:column;gap:12px}
.form-label{font-size:13px;color:#94a3b8;margin-bottom:4px;display:block}
.form-label-sm{font-size:12px;color:#94a3b8;margin-bottom:2px;display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-hint{font-size:12px;color:#64748b}
.inline-edit{display:inline-flex;align-items:center;gap:4px}
.inline-edit .input{width:60px;padding:2px 6px;font-size:12px}
.inline-edit .confirm{background:none;border:none;color:#3b82f6;cursor:pointer;font-size:12px}
.clickable{cursor:pointer}
.content{padding:8px 16px}
.meal-section{margin-bottom:16px}
.meal-header{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:4px}
.meal-name{font-weight:700;font-size:15px}
.meal-kcal{font-size:14px;color:#f59e0b;font-weight:600}
.meal-add{background:none;border:1px dashed #334155;border-radius:8px;padding:10px;width:100%;color:#3b82f6;font-size:13px;cursor:pointer;margin-top:4px;font-weight:500}
.meal-wait{display:flex;align-items:center;gap:6px;background:#0f172a;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:12px;color:#94a3b8}
.meal-wait .wait-icon{font-size:14px}
.meal-wait .wait-time{color:#f59e0b;font-weight:600}
.weight-card{background:#1e293b;border-radius:10px;padding:12px 14px;margin:8px 16px 4px;display:flex;align-items:center;gap:10px}
.weight-card .icon{font-size:18px}
.weight-card .input{width:80px;padding:6px 8px;font-size:14px;text-align:center}
.weight-card .unit{font-size:13px;color:#64748b}
.weight-card .saved{font-size:12px;color:#22c55e;margin-left:auto}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #1e293b;display:flex;z-index:20;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
.tab-bar .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;cursor:pointer;border:none;background:none;color:#64748b;font-size:10px;gap:2px}
.tab-bar .tab.active{color:#f59e0b}
.tab-bar .tab .tab-icon{font-size:20px}
.chart-container{padding:16px}
.chart-card{background:#1e293b;border-radius:12px;padding:16px}
.chart-stats{display:flex;gap:8px;margin-top:16px}
.chart-stat{flex:1;text-align:center;background:#0f172a;border-radius:8px;padding:10px 6px}
.chart-stat .val{font-size:18px;font-weight:700}
.chart-stat .lbl{font-size:11px;color:#64748b;margin-top:2px}
.chart-range{display:flex;gap:6px;margin-bottom:16px}
.chart-range .btn{padding:6px 10px;font-size:12px;border-radius:6px}
.chart-range .btn.active{background:#3b82f6}
.no-data{color:#475569;text-align:center;padding:48px 16px}
.workout-title{font-size:22px;font-weight:800;margin:16px 16px 4px;color:#f59e0b}
.workout-subtitle{font-size:13px;color:#64748b;margin:0 16px 12px}
.ex-card{background:#1e293b;border-radius:10px;padding:14px;margin:0 16px 8px;position:relative}
.ex-card.done{opacity:0.5}
.ex-name{font-weight:700;font-size:15px;margin-bottom:4px}
.ex-detail{font-size:13px;color:#94a3b8;margin-bottom:2px}
.ex-kg{font-size:13px;color:#e2e8f0;cursor:pointer;display:inline-flex;align-items:center;gap:4px;background:#0f172a;border-radius:4px;padding:2px 8px}
.ex-kg:hover{background:#334155}
.ex-kg-edit{display:inline-flex;align-items:center;gap:4px}
.ex-kg-edit .input{width:90px;padding:4px 8px;font-size:13px}
.ex-kg-edit .confirm{background:none;border:none;color:#3b82f6;cursor:pointer;font-size:14px;padding:2px}
.ex-kg-edit .cancel{background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;padding:2px}
.ex-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ex-left{flex:1}
.ex-check{width:36px;height:36px;border-radius:50%;border:2px solid #334155;background:none;color:#64748b;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-check.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.rest-btn{display:inline-flex;align-items:center;gap:4px;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:4px 10px;color:#94a3b8;font-size:12px;cursor:pointer;margin-top:6px}
.rest-btn.active{border-color:#f59e0b;color:#f59e0b}
.timer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,0.95);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.timer-ring{position:relative;width:220px;height:220px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .time-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.prog-note{background:#1e293b;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:12px 14px;margin:16px 16px 8px;font-size:13px;color:#94a3b8}
.prog-note strong{color:#e2e8f0;font-weight:600}
.rest-day-msg{text-align:center;padding:80px 32px;color:#64748b}
.rest-day-msg .icon{font-size:48px;margin-bottom:16px}
.rest-day-msg .title{font-size:20px;font-weight:700;color:#e2e8f0;margin-bottom:8px}
.hold-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;border:none;margin-top:4px}
.hold-badge.holding{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44}
.hold-badge.ready{background:#22c55e18;color:#22c55e;border:1px solid #22c55e33}
</style>
