<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Makro">
<title>Makro Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23000'/><text x='50' y='68' text-anchor='middle' font-size='52' font-family='sans-serif' font-weight='800' fill='%23d4a054'>M</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#e8e4de;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:68px}

/* Header */
.header{position:sticky;top:0;background:linear-gradient(to bottom,#000 80%,transparent);z-index:10;padding:14px 16px 18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* Buttons */
.btn{background:#161616;color:#c8c2b8;border:1px solid #222;border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;font-weight:500;-webkit-appearance:none;transition:all 0.2s;letter-spacing:0.01em}
.btn:active{transform:scale(0.97);opacity:0.8}
.btn-blue{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border:none;box-shadow:0 2px 12px #3b82f620}
.btn-green{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;box-shadow:0 2px 12px #22c55e20}
.btn-red{background:#dc2626;color:#fff;border:none}

/* Inputs */
.input{background:#0a0a0a;color:#e8e4de;border:1px solid #1a1a1a;border-radius:10px;padding:11px 14px;font-size:14px;width:100%;outline:none;-webkit-appearance:none;transition:border-color 0.2s;font-family:inherit}
.input:focus{border-color:#d4a054;box-shadow:0 0 0 3px #d4a05415}

/* Cards */
.card{background:#0c0c0c;border:1px solid #161616;border-radius:12px;padding:13px;margin-bottom:6px;transition:border-color 0.2s}

/* Macro bars */
.macro-row{display:flex;gap:12px}
.macro-col{flex:1;min-width:0}
.macro-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;color:#5a5549;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.macro-val{color:#a09888}.macro-val.over{color:#ef4444}
.macro-track{height:4px;background:#111;border-radius:2px;overflow:hidden}
.macro-fill{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}

/* Big number */
.big-num{text-align:center;padding:28px 16px 12px}
.big-num .num{font-size:56px;font-weight:800;letter-spacing:-2px;line-height:1}
.big-num .sub{font-size:12px;color:#3d3830;margin-top:6px;letter-spacing:0.04em;font-weight:500}

/* General */
.empty{color:#2a2520;text-align:center;padding:36px;font-size:13px}
.food-meta{font-size:11px;color:#4a4540;letter-spacing:0.01em}
.entry-row{display:flex;align-items:center;gap:10px}
.entry-kcal{font-weight:700;font-size:14px;color:#d4a054;min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.remove-btn{background:none;border:none;color:#2a2520;cursor:pointer;font-size:16px;padding:0 4px;transition:color 0.2s}
.remove-btn:active{color:#ef4444}
.edit-btn{background:none;border:none;color:#3d3830;cursor:pointer;font-size:12px;padding:2px 6px}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.date-center{text-align:center}
.date-title{font-weight:700;font-size:15px;letter-spacing:0.02em;color:#e8e4de}
.today-btn{background:none;border:none;color:#d4a054;font-size:11px;cursor:pointer;padding:0;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.bottom-actions{padding:12px 16px 8px;display:flex;gap:8px}
.bottom-actions .btn{flex:1;padding:14px;font-size:15px}
.bottom-actions .btn:last-child{flex:0}
.nav-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.nav-title{font-weight:600;font-size:15px;letter-spacing:0.01em}
.search-row{display:flex;gap:8px}
.search-row .input{flex:1}
.food-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.food-name{font-weight:600;font-size:13px;color:#e8e4de}
.add-row{display:flex;gap:8px;align-items:center}
.add-row .input{width:70px;padding:6px 8px;font-size:13px;text-align:center}
.add-row .g-label{font-size:11px;color:#3d3830}
.add-row .kcal-preview{flex:1;font-size:11px;color:#5a5549;text-align:right}

/* Forms */
.form-section{padding:16px;display:flex;flex-direction:column;gap:14px}
.form-label{font-size:12px;color:#5a5549;margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.form-label-sm{font-size:11px;color:#5a5549;margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-hint{font-size:11px;color:#3d3830;font-weight:500}
.inline-edit{display:inline-flex;align-items:center;gap:4px}
.inline-edit .input{width:60px;padding:2px 6px;font-size:12px}
.inline-edit .confirm{background:none;border:none;color:#d4a054;cursor:pointer;font-size:12px}
.clickable{cursor:pointer}
.content{padding:8px 16px}

/* Meal sections */
.meal-section{margin-bottom:20px}
.meal-header{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px;border-bottom:1px solid #111}
.meal-name{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:#6a6358}
.meal-time{font-size:11px;color:#d4a054;margin-left:8px;font-weight:500;letter-spacing:0.02em;text-transform:none}
.meal-kcal{font-size:13px;color:#d4a054;font-weight:600;font-variant-numeric:tabular-nums}
.snack-time{font-size:11px;color:#d4a054;margin-top:10px;margin-bottom:3px;font-weight:500}
.meal-add{background:none;border:1px solid #161616;border-radius:10px;padding:11px;width:100%;color:#3d3830;font-size:12px;cursor:pointer;margin-top:6px;font-weight:600;letter-spacing:0.02em;transition:all 0.2s}
.meal-add:active{border-color:#d4a054;color:#d4a054}
.meal-wait{display:flex;align-items:center;gap:6px;background:#0a0a0a;border:1px solid #111;border-radius:8px;padding:7px 10px;margin-top:6px;font-size:11px;color:#4a4540}
.meal-wait .wait-icon{font-size:13px}
.meal-wait .wait-time{color:#d4a054;font-weight:600}

/* DagTimer */
.dt-card{background:#0a0a0a;border:1px solid #141414;border-radius:12px;padding:11px 14px 9px;position:relative;overflow:hidden;transition:all .2s ease;cursor:pointer}
.dt-card.active{padding:14px 14px 12px;background:#0d0b08;border-color:#2a2010}
.dt-card.done{opacity:.45;background:#040d04;border-color:#0a1a0a}
.dt-card .dt-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:#d4a054;border-radius:2px 0 0 2px}
.dt-prog{height:2px;border-radius:1px;margin-top:8px;overflow:hidden}
.dt-edit{font-size:10px;color:#3d3830;cursor:pointer;padding:2px 6px;border-radius:4px;background:#111;margin-left:2px;border:none;font-family:inherit}
@keyframes dtPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes dtSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes dtFadeIn{from{opacity:0}to{opacity:1}}
@keyframes dtSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Notes */
.note-card{background:#0c0c0c;border:1px solid #161616;border-radius:12px;padding:12px 14px;margin-bottom:6px}
.note-text{font-size:13px;color:#e8e4de;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.note-meta{font-size:10px;color:#3d3830;margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.note-input{background:#0a0a0a;color:#e8e4de;border:1px solid #1a1a1a;border-radius:12px;padding:12px 14px;font-size:14px;width:100%;outline:none;resize:none;min-height:80px;font-family:inherit;-webkit-appearance:none;transition:border-color 0.2s;line-height:1.5}
.note-input:focus{border-color:#d4a054;box-shadow:0 0 0 3px #d4a05415}

/* Exercise images */
.ex-img-wrap{margin-top:8px;position:relative;display:inline-block}
.ex-img{max-width:100%;max-height:180px;border-radius:8px;border:1px solid #1a1a1a;display:block}
.ex-img-del{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:12px;background:rgba(0,0,0,.8);border:1px solid #333;color:#999;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.ex-img-btn{display:inline-flex;align-items:center;gap:4px;background:#080808;border:1px solid #1a1a1a;border-radius:8px;padding:5px 10px;color:#5a5549;font-size:11px;cursor:pointer;margin-top:6px;transition:all 0.2s;font-weight:500;font-family:inherit}
.ex-img-btn:active{border-color:#d4a054;color:#d4a054}
.preset-card{background:#0c0c0c;border:1px solid #161616;border-radius:12px;padding:12px 14px;margin-bottom:6px}
.preset-name{font-weight:600;font-size:13px;color:#d4a054}
.preset-items{font-size:11px;color:#5a5549;margin-top:3px;line-height:1.4}
.preset-meta{font-size:11px;color:#4a4540;margin-top:4px;font-variant-numeric:tabular-nums}
.preset-actions{display:flex;gap:6px;margin-top:8px}
.preset-save-btn{background:none;border:1px solid #1a1a1a;border-radius:8px;padding:5px 10px;color:#5a5549;font-size:11px;cursor:pointer;font-weight:500;font-family:inherit;transition:all 0.2s;display:inline-flex;align-items:center;gap:4px}
.preset-save-btn:active{border-color:#d4a054;color:#d4a054}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #111;display:flex;z-index:20;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
.tab-bar .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 7px;cursor:pointer;border:none;background:none;color:#2a2520;font-size:9px;gap:3px;transition:color 0.2s;letter-spacing:0.04em;font-weight:600;text-transform:uppercase;font-family:inherit}
.tab-bar .tab.active{color:#d4a054}
.tab-bar .tab .tab-icon{font-size:20px}

/* removed chart css */

/* Training */
.workout-title{font-size:24px;font-weight:800;margin:20px 16px 4px;color:#d4a054;letter-spacing:-0.5px}
.workout-subtitle{font-size:12px;color:#3d3830;margin:0 16px 14px;font-weight:500;letter-spacing:0.02em}
.ex-card{background:#0c0c0c;border:1px solid #161616;border-radius:12px;padding:14px;margin:0 16px 8px;position:relative;transition:border-color 0.2s}
.ex-card.done{opacity:0.35;border-color:#0a0a0a}
.ex-name{font-weight:700;font-size:14px;margin-bottom:4px;color:#e8e4de;letter-spacing:0.01em}
.ex-detail{font-size:12px;color:#5a5549;margin-bottom:2px}
.ex-kg{font-size:12px;color:#c8c2b8;cursor:pointer;display:inline-flex;align-items:center;gap:4px;background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:3px 10px;transition:all 0.2s}
.ex-kg:active{border-color:#d4a054}
.ex-kg-edit{display:inline-flex;align-items:center;gap:4px}
.ex-kg-edit .input{width:90px;padding:4px 8px;font-size:13px}
.ex-kg-edit .confirm{background:none;border:none;color:#d4a054;cursor:pointer;font-size:14px;padding:2px}
.ex-kg-edit .cancel{background:none;border:none;color:#3d3830;cursor:pointer;font-size:14px;padding:2px}
.ex-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ex-left{flex:1}
.ex-check{width:38px;height:38px;border-radius:50%;border:2px solid #1a1a1a;background:none;color:#2a2520;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.25s}
.ex-check.checked{background:#d4a054;border-color:#d4a054;color:#000;box-shadow:0 2px 12px #d4a05440}
.rest-btn{display:inline-flex;align-items:center;gap:4px;background:#080808;border:1px solid #1a1a1a;border-radius:8px;padding:5px 10px;color:#5a5549;font-size:11px;cursor:pointer;margin-top:6px;transition:all 0.2s;font-weight:500}
.rest-btn:active{border-color:#d4a054;color:#d4a054}
.rest-btn.active{border-color:#d4a054;color:#d4a054}

/* Grej-badges (FG / Straps) */
.ex-name{display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.gear-tag{display:inline-flex;align-items:center;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;line-height:1.4}
.gear-fg{background:#1a1410;color:#d4a054;border:1px solid #3a2818}
.gear-straps{background:#0d1422;color:#7da7d9;border:1px solid #1c2a3f}

/* Sæt-linje med inline badges */
.ex-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:12px;color:#5a5549;margin-bottom:2px}
.meta-rpe{color:#7da7d9;font-weight:600;letter-spacing:0.02em}
.meta-tech{color:#c4956a;font-weight:600;font-size:11px;letter-spacing:0.04em;background:#1a1410;border:1px solid #3a2818;padding:1px 6px;border-radius:4px;text-transform:uppercase}
.meta-sep{color:#3d3830}

/* Opvarmnings-ramping baseret på working kg */
.warmup-line{font-size:11px;color:#7a7466;margin:2px 0 4px;letter-spacing:0.01em;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.warmup-line .warmup-label{color:#5a5549;text-transform:uppercase;font-size:10px;letter-spacing:0.06em}
.warmup-line .warmup-arrow{color:#3d3830;margin:0 2px}
.warmup-line .warmup-unit{color:#5a5549;margin-left:2px}

/* Timer */
.timer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.timer-ring{position:relative;width:240px;height:240px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .time-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}

/* Multi-timer */
.mt-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:14px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;transition:border-color .2s}
.mt-card.running{border-color:#2a2010}
.mt-card.finished{border-color:#1a3a1a;background:#0a1a0a}
.mt-card .mt-accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.mt-name{font-size:13px;font-weight:600;letter-spacing:.02em;background:transparent;border:none;color:#e8e4de;outline:none;width:100%;padding:0;margin-bottom:8px}
.mt-name:focus{color:#d4a054}
.mt-display{font-family:monospace;font-size:44px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;text-align:center;margin:6px 0 10px;line-height:1}
.mt-prog{height:4px;background:#141414;border-radius:2px;overflow:hidden;margin-bottom:12px}
.mt-prog-fill{height:100%;border-radius:2px;transition:width .25s linear}
.mt-controls{display:flex;gap:6px;align-items:center}
.mt-controls .mt-btn{flex:1;padding:10px 0;font-size:13px;font-weight:600;background:#141414;border:1px solid #1a1a1a;color:#a09888;border-radius:8px;cursor:pointer;transition:all .15s}
.mt-controls .mt-btn:active{transform:scale(0.96)}
.mt-controls .mt-btn.primary{background:linear-gradient(135deg,#d4a054,#e8c88a);color:#000;border:none;font-weight:700}
.mt-controls .mt-btn.primary.pause{background:#1a1a1a;color:#e8e4de;border:1px solid #2a2a2a;font-weight:600}
.mt-controls .mt-btn.adj{flex:0 0 44px;font-size:12px;padding:10px 0}
.mt-controls .mt-btn.del{flex:0 0 36px;color:#666;font-size:14px}
.mt-meta{display:flex;justify-content:space-between;font-size:10px;color:#3d3830;margin-top:8px;letter-spacing:.04em;text-transform:uppercase}
.mt-add{width:100%;padding:14px;background:transparent;border:1px dashed #2a2a2a;border-radius:10px;color:#5a5549;font-size:13px;cursor:pointer;margin-top:4px}
.mt-add:active{background:#0a0a0a}
.mt-info{margin-top:18px;padding:12px 14px;background:#0c0c0c;border:1px solid #161616;border-radius:10px;font-size:11px;color:#3d3830;line-height:1.6}

/* Progression */
.prog-note{background:#0a0a0a;border-left:2px solid #d4a054;border-radius:0 10px 10px 0;padding:13px 16px;margin:18px 16px 8px;font-size:12px;color:#4a4540;line-height:1.6}
.prog-note strong{color:#a09888;font-weight:600}

/* Rest day */
.rest-day-msg{text-align:center;padding:80px 32px;color:#3d3830}
.rest-day-msg .icon{font-size:48px;margin-bottom:16px}
.rest-day-msg .title{font-size:20px;font-weight:700;color:#e8e4de;margin-bottom:8px;letter-spacing:-0.3px}

/* Progression strip */
.prog-strip{display:flex;align-items:center;gap:8px;margin:6px 0 2px;padding:5px 9px;background:#080808;border:1px solid #141414;border-radius:7px;cursor:pointer;transition:border-color 0.2s}
.prog-strip:active{border-color:#2a2a2a}
.prog-strip.expanded{border-color:#1a1a1a}
.p-dots{display:flex;gap:3px;align-items:center}
.p-dot{display:inline-block;font-size:10px;line-height:1;font-weight:700;min-width:9px;text-align:center;font-variant-numeric:tabular-nums}
.p-up{color:#22c55e}
.p-down{color:#ef4444}
.p-same{color:#3d3830}
.p-first{color:#d4a054}
.p-txt{font-size:10px;color:#5a5549;font-weight:600;letter-spacing:0.02em;font-variant-numeric:tabular-nums;margin-left:auto;text-transform:uppercase}
.p-txt.up{color:#22c55e}
.p-txt.down{color:#ef4444}
.p-txt.stall{color:#5a5549}
.prog-expand{background:#070707;border:1px solid #141414;border-top:none;border-radius:0 0 7px 7px;margin:-2px 0 2px;padding:6px 9px 8px}
.pe-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 0;color:#7a7468;font-variant-numeric:tabular-nums;border-bottom:1px solid #101010}
.pe-row:last-child{border-bottom:none}
.pe-date{color:#5a5549}
.pe-kg{font-weight:600;color:#c8c2b8}
.pe-delta{font-size:10px;font-weight:600;min-width:42px;text-align:right}
.pe-delta.up{color:#22c55e}
.pe-delta.down{color:#ef4444}
.pe-delta.same{color:#3d3830}
.pe-del{background:none;border:none;color:#2a2520;cursor:pointer;font-size:12px;padding:0 4px;margin-left:6px}
.pe-del:active{color:#ef4444}

.complete-btn{display:block;margin:20px 16px;padding:16px;width:calc(100% - 32px);background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.02em;box-shadow:0 2px 12px #22c55e20;transition:all 0.2s}
.complete-btn:active{transform:scale(0.97);opacity:0.85}
.workout-picker-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
.workout-picker{background:#0c0c0c;border:1px solid #1a1a1a;border-radius:16px;padding:20px;width:100%;max-width:360px}
.workout-picker h3{color:#e8e4de;font-size:15px;margin-bottom:14px;text-align:center;font-weight:700;letter-spacing:0.02em}
.wp-option{display:flex;align-items:center;justify-content:space-between;padding:12px;border:1px solid #161616;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all 0.2s;background:#080808}
.wp-option:active,.wp-option.current{border-color:#d4a054;background:#d4a05408}
.wp-option .wp-name{font-weight:600;font-size:13px;color:#e8e4de}
.wp-option .wp-tag{font-size:11px;color:#5a5549}
.wp-option.current .wp-name{color:#d4a054}
.workout-nav{display:flex;align-items:center;gap:8px;margin:0 16px 4px}
.workout-nav-btn{background:none;border:none;color:#5a5549;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.04em;padding:4px 8px;border-radius:6px;border:1px solid #161616;transition:all 0.2s;font-family:inherit}
.workout-nav-btn:active{border-color:#d4a054;color:#d4a054}
.last-trained{font-size:11px;color:#3d3830;margin:0 16px 12px;font-weight:500}

/* Mesocyklus */
.meso-card{margin:0 16px 12px;padding:11px 13px;background:#0a0a0a;border:1px solid #141414;border-radius:10px;cursor:pointer;transition:border-color 0.2s}
.meso-card:active{border-color:#1a1a1a}
.meso-card.deload{background:linear-gradient(135deg,#0a1422 0%,#0a0a0a 60%);border-color:#1c2a3f}
.meso-card.last-build{border-color:#2a2010}
.meso-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.meso-label{font-size:10px;color:#5a5549;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.meso-card.deload .meso-label{color:#7da7d9}
.meso-week-txt{font-size:11px;color:#a09888;font-weight:600;font-variant-numeric:tabular-nums}
.meso-card.deload .meso-week-txt{color:#7da7d9}
.meso-bar{display:flex;gap:3px;height:6px;margin-bottom:7px}
.meso-seg{flex:1;border-radius:2px;background:#141414;transition:background 0.3s}
.meso-seg.done{background:#2a2010}
.meso-seg.current{background:#d4a054;box-shadow:0 0 8px #d4a05450}
.meso-seg.deload{background:#1a2a3f}
.meso-seg.deload.current{background:#5b8def;box-shadow:0 0 8px #5b8def50}
.meso-foot{font-size:11px;color:#5a5549;letter-spacing:0.01em}
.meso-card.deload .meso-foot{color:#7da7d9}
.meso-card.last-build .meso-foot{color:#c4956a}

/* Deload-badge på sets-feltet */
.deload-badge{display:inline-flex;align-items:center;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:#0d1422;color:#7da7d9;border:1px solid #1c2a3f;margin-left:4px}
.tech-skipped{color:#3d3830 !important;text-decoration:line-through;background:transparent !important;border:1px dashed #2a2520 !important}
.tech-skipped::after{content:" \xB7 skip";text-decoration:none;display:inline}

/* Deload kg-visning: normal → deload pil */
.ex-kg-deload{background:#0a1422;border-color:#1c2a3f}
.ex-kg-deload:active{border-color:#5b8def}
.ex-kg-deload .kg-orig{color:#3d3830;font-variant-numeric:tabular-nums}
.ex-kg-deload .kg-arrow{color:#3d3830;font-size:10px}
.ex-kg-deload .kg-deload{color:#7da7d9;font-weight:600;font-variant-numeric:tabular-nums}
.kg-edit-hint{font-size:9px;color:#5b8def;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;margin-left:6px;cursor:help}

/* Meso config modal */
.meso-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.meso-modal{background:#0c0c0c;border:1px solid #1a1a1a;border-radius:16px;padding:20px;width:100%;max-width:380px}
.meso-modal h3{color:#e8e4de;font-size:15px;margin-bottom:14px;font-weight:700;letter-spacing:0.02em}
.meso-modal .form-row{margin-bottom:14px}
.meso-modal .form-row:last-child{margin-bottom:0}
.meso-modal .form-row .form-label-sm{margin-bottom:6px}
.meso-modal .hint{font-size:10px;color:#3d3830;margin-top:4px;line-height:1.4}
.meso-modal .actions{display:flex;gap:8px;margin-top:18px}
.meso-modal .actions .btn{flex:1;padding:11px;font-size:13px}
.meso-modal .actions .btn-primary{background:linear-gradient(135deg,#d4a054,#e8c88a);color:#000;border:none;font-weight:700}

var IMAGE_LINKS=(function(){var nm={};Object.keys(DEFAULT_WORKOUTS).forEach(function(tag){DEFAULT_WORKOUTS[tag].exercises.forEach(function(ex){var k=ex.name.toLowerCase();if(!nm[k])nm[k]=[];nm[k].push(ex.id)})});var links={};Object.keys(nm).forEach(function(k){if(nm[k].length>1)nm[k].forEach(function(id){links[id]=nm[k].filter(function(x){return x!==id})})});return links})();

function parseRestSeconds(restStr){var match=restStr.match(/(\d+(?:,\d+)?)/);if(!match)return 120;return Math.round(parseFloat(match[1].replace(',','.'))*60)}

// Warmup schemes per Nippard Program 14 (using lowest count per exercise spec).
// Each entry: percentage of working weight. Reps decrease as ramp progresses (6-10 → 4-6 → 3-4 → 2-4).
var WARMUP_SCHEMES={1:[0.60],2:[0.50,0.70],3:[0.45,0.65,0.85],4:[0.45,0.60,0.75,0.85]};
// barWeight: when set (e.g. 20 for barbell exercises), kg-field stores PER-SIDE plate weight.
// Whole-line regime: if ALL warmup totals ≥ barWeight, show per-side values (loadable on 20 kg bar).
// Otherwise show total weight (user picks 15 kg bar, DBs, or other equipment for sub-bar warmups).
function computeWarmups(workingKgStr,count,barWeight){
  if(!count)return null;
  var n=parseKgNum(workingKgStr);
  if(n===null||n<=0)return null;
  var scheme=WARMUP_SCHEMES[count];
  if(!scheme)return null;
  var totalWorking=barWeight?(barWeight+2*n):n;
  var totals=scheme.map(function(pct){return totalWorking*pct});
  var usePerSide=barWeight&&totals.every(function(t){return t>=barWeight});
  return totals.map(function(totalWarmup){
    var displayKg=usePerSide?(totalWarmup-barWeight)/2:totalWarmup;
    return Math.round(displayKg*2)/2; // round to nearest 0.5 kg
  });
}

// Default: 6 ugers buildup + 1 uges deload. Følger Nippards anbefalinger i kapitel 13.
var MESO_DEFAULTS={buildupWeeks:6,deloadWeeks:1};
function getDayDiff(dateStrA,dateStrB){
  // Beregner dage fra A til B (positiv hvis B er senere)
  var a=new Date(dateStrA+'T12:00:00').getTime();
  var b=new Date(dateStrB+'T12:00:00').getTime();
  return Math.floor((b-a)/(1000*60*60*24));
}
function computeMesoState(today,mesoStart,cfg){
  // Returns {week, total, isDeload, isLastBuild, daysIntoWeek, weeksUntilDeload}
  var total=cfg.buildupWeeks+cfg.deloadWeeks;
  if(!mesoStart)return{week:1,total:total,isDeload:false,isLastBuild:false,daysIntoWeek:0,weeksUntilDeload:cfg.buildupWeeks-1};
  var days=getDayDiff(mesoStart,today);
  if(days<0)days=0;
  var weeksSince=Math.floor(days/7);
  var cycleWeek=weeksSince%total;
  var week=cycleWeek+1;
  var isDeload=week>cfg.buildupWeeks;
  var isLastBuild=week===cfg.buildupWeeks;
  var weeksUntilDeload=isDeload?0:cfg.buildupWeeks-week;
  return{week:week,total:total,isDeload:isDeload,isLastBuild:isLastBuild,daysIntoWeek:days%7,weeksUntilDeload:weeksUntilDeload};
}
// Reducer RPE-tal med ~2 punkter (min 5). Bevarer "X-Y → Z-W" formatet.
function deloadRpe(rpeStr){
  if(!rpeStr)return rpeStr;
  return rpeStr.replace(/(\d+)/g,function(m){var n=parseInt(m,10);return Math.max(5,n-2)});
}
// Skær 1 sæt af (min 1). "3x6-8" → "2x6-8", "2x8-10" → "1x8-10".
function deloadSets(setsStr){
  if(!setsStr)return setsStr;
  return setsStr.replace(/^(\d+)x/,function(m,n){var k=Math.max(1,parseInt(n,10)-1);return k+'x'});
}
// Reducer kg med 10% (Nippard: -5-10% af 1RM). For stang-øvelser regnes på TOTAL vægt,
// så lette stang-løft (fx 3,75 kg per side på OHP) får ægte 10% reduktion ikke kun 10% af tillægsvægten.
// Rundes til nærmeste 0,5 kg. Returnerer null hvis kg-feltet ikke kan parses.
function deloadKg(kgStr,barWeight){
  if(!kgStr)return kgStr;
  var num=parseKgNum(kgStr);
  if(num===null)return kgStr;
  var rounded;
  if(barWeight){
    var totalNormal=barWeight+2*num;
    var totalDeload=totalNormal*0.9;
    var perSideDeload=Math.max(0,(totalDeload-barWeight)/2);
    rounded=Math.round(perSideDeload*2)/2;
  } else {
    rounded=Math.round(num*0.9*2)/2;
  }
  return kgStr.replace(/(\d+(?:[,.]\d+)?)/,(''+rounded).replace('.',','));
}
function applyDeload(ex){

// Load cyklus. Hvis HTML's CYCLE_VERSION er nyere end den gemte version,
// overskrives localStorage med DEFAULT_CYCLE og der returneres needsSync=true,
// så foods-databasen kan opdateres til at matche de nye makroer.
function loadCycle(){
  try{
    var storedVer=parseInt(localStorage.getItem(CYCLE_VERSION_KEY)||'0',10);
    if(storedVer<CYCLE_VERSION){
      var fresh=JSON.parse(JSON.stringify(DEFAULT_CYCLE));
      localStorage.setItem(CYCLE_KEY,JSON.stringify(fresh));
      localStorage.setItem(CYCLE_VERSION_KEY,''+CYCLE_VERSION);
      return {cycle:fresh,needsSync:true};
    }
    var c=JSON.parse(localStorage.getItem(CYCLE_KEY));
    return {cycle:c||JSON.parse(JSON.stringify(DEFAULT_CYCLE)),needsSync:false};
  }catch(x){
    return {cycle:JSON.parse(JSON.stringify(DEFAULT_CYCLE)),needsSync:true};
  }
}

// Sync alle foods i data.foods der matcher cyklus-items by name med cyklus-makroer.
// Returnerer ny foods-array (immutable).
function syncFoodsToCycle(foods,cycle){
  var nameMap={};
  Object.keys(cycle).forEach(function(day){
    Object.keys(cycle[day].meals).forEach(function(meal){
      cycle[day].meals[meal].forEach(function(item){
        nameMap[item.name]=item;
      });
    });
  });
  return foods.map(function(f){
    var ci=nameMap[f.name];
    if(!ci)return f;
    return Object.assign({},f,{kcal:ci.kcal,protein:ci.protein,carbs:ci.carbs,fat:ci.fat});
  });
}

function resizeImage(file,maxW,cb){
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*(maxW/w));w=maxW}
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.85));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
