<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Makro">
<title>Makro Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23000'/><text x='50' y='68' text-anchor='middle' font-size='52' font-family='sans-serif' font-weight='800' fill='%23d4a054'>M</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#e8e4de;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:68px}

/* Header */
.header{position:sticky;top:0;background:linear-gradient(to bottom,#000 80%,transparent);z-index:10;padding:14px 16px 18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* Buttons */
.btn{background:#161616;color:#c8c2b8;border:1px solid #222;border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;font-weight:500;-webkit-appearance:none;transition:all 0.2s;letter-spacing:0.01em}
.btn:active{transform:scale(0.97);opacity:0.8}
.btn-blue{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border:none;box-shadow:0 2px 12px #3b82f620}
.btn-green{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;box-shadow:0 2px 12px #22c55e20}
.btn-red{background:#dc2626;color:#fff;border:none}

/* Inputs */
.input{background:#0a0a0a;color:#e8e4de;border:1px solid #1a1a1a;border-radius:10px;padding:11px 14px;font-size:14px;width:100%;outline:none;-webkit-appearance:none;transition:border-color 0.2s;font-family:inherit}
.input:focus{border-color:#d4a054;box-shadow:0 0 0 3px #d4a05415}

/* Cards */
.card{background:#0c0c0c;border:1px solid #161616;border-radius:12px;padding:13px;margin-bottom:6px;transition:border-color 0.2s}

/* Macro bars */
.macro-row{display:flex;gap:12px}
.macro-col{flex:1;min-width:0}
.macro-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;color:#5a5549;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.macro-val{color:#a09888}.macro-val.over{color:#ef4444}
.macro-track{height:4px;background:#111;border-radius:2px;overflow:hidden}
.macro-fill{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}

/* Big number */
.big-num{text-align:center;padding:28px 16px 12px}
.big-num .num{font-size:56px;font-weight:800;letter-spacing:-2px;line-height:1}
.big-num .sub{font-size:12px;color:#3d3830;margin-top:6px;letter-spacing:0.04em;font-weight:500}

/* General */
.empty{color:#2a2520;text-align:center;padding:36px;font-size:13px}
.food-meta{font-size:11px;color:#4a4540;letter-spacing:0.01em}
.entry-row{display:flex;align-items:center;gap:10px}
.entry-kcal{font-weight:700;font-size:14px;color:#d4a054;min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.remove-btn{background:none;border:none;color:#2a2520;cursor:pointer;font-size:16px;padding:0 4px;transition:color 0.2s}
.remove-btn:active{color:#ef4444}
.edit-btn{background:none;border:none;color:#3d3830;cursor:pointer;font-size:12px;padding:2px 6px}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.date-center{text-align:center}
.date-title{font-weight:700;font-size:15px;letter-spacing:0.02em;color:#e8e4de}
.today-btn{background:none;border:none;color:#d4a054;font-size:11px;cursor:pointer;padding:0;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.bottom-actions{padding:12px 16px 8px;display:flex;gap:8px}
.bottom-actions .btn{flex:1;padding:14px;font-size:15px}
.bottom-actions .btn:last-child{flex:0}
.nav-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.nav-title{font-weight:600;font-size:15px;letter-spacing:0.01em}
.search-row{display:flex;gap:8px}
.search-row .input{flex:1}
.food-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.food-name{font-weight:600;font-size:13px;color:#e8e4de}
.add-row{display:flex;gap:8px;align-items:center}
.add-row .input{width:70px;padding:6px 8px;font-size:13px;text-align:center}
.add-row .g-label{font-size:11px;color:#3d3830}
.add-row .kcal-preview{flex:1;font-size:11px;color:#5a5549;text-align:right}

/* Forms */
.form-section{padding:16px;display:flex;flex-direction:column;gap:14px}
.form-label{font-size:12px;color:#5a5549;margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.form-label-sm{font-size:11px;color:#5a5549;margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-hint{font-size:11px;color:#3d3830;font-weight:500}
.inline-edit{display:inline-flex;align-items:center;gap:4px}
.inline-edit .input{width:60px;padding:2px 6px;font-size:12px}
.inline-edit .confirm{background:none;border:none;color:#d4a054;cursor:pointer;font-size:12px}
.clickable{cursor:pointer}
.content{padding:8px 16px}

/* Meal sections */
.meal-section{margin-bottom:20px}
.meal-header{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px;border-bottom:1px solid #111}
.meal-name{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:#6a6358}
.meal-time{font-size:11px;color:#d4a054;margin-left:8px;font-weight:500;letter-spacing:0.02em;text-transform:none}
.meal-kcal{font-size:13px;color:#d4a054;font-weight:600;font-variant-numeric:tabular-nums}
.snack-time{font-size:11px;color:#d4a054;margin-top:10px;margin-bottom:3px;font-weight:500}
.meal-add{background:none;border:1px solid #161616;border-radius:10px;padding:11px;width:100%;color:#3d3830;font-size:12px;cursor:pointer;margin-top:6px;font-weight:600;letter-spacing:0.02em;transition:all 0.2s}
.meal-add:active{border-color:#d4a054;color:#d4a054}
.meal-wait{display:flex;align-items:center;gap:6px;background:#0a0a0a;border:1px solid #111;border-radius:8px;padding:7px 10px;margin-top:6px;font-size:11px;color:#4a4540}
.meal-wait .wait-icon{font-size:13px}
.meal-wait .wait-time{color:#d4a054;font-weight:600}

/* DagTimer */
.dt-card{background:#0a0a0a;border:1px solid #141414;border-radius:12px;padding:11px 14px 9px;position:relative;overflow:hidden;transition:all .2s ease;cursor:pointer}
.dt-card.active{padding:14px 14px 12px;background:#0d0b08;border-color:#2a2010}
.dt-card.done{opacity:.45;background:#040d04;border-color:#0a1a0a}
.dt-card .dt-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:#d4a054;border-radius:2px 0 0 2px}
.dt-prog{height:2px;border-radius:1px;margin-top:8px;overflow:hidden}
.dt-edit{font-size:10px;color:#3d3830;cursor:pointer;padding:2px 6px;border-radius:4px;background:#111;margin-left:2px;border:none;font-family:inherit}
@keyframes dtPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes dtSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes dtFadeIn{from{opacity:0}to{opacity:1}}
@keyframes dtSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Notes */
.note-card{background:#0c0c0c;border:1px solid #161616;border-radius:12px;padding:12px 14px;margin-bottom:6px}
.note-text{font-size:13px;color:#e8e4de;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.note-meta{font-size:10px;color:#3d3830;margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.note-input{background:#0a0a0a;color:#e8e4de;border:1px solid #1a1a1a;border-radius:12px;padding:12px 14px;font-size:14px;width:100%;outline:none;resize:none;min-height:80px;font-family:inherit;-webkit-appearance:none;transition:border-color 0.2s;line-height:1.5}
.note-input:focus{border-color:#d4a054;box-shadow:0 0 0 3px #d4a05415}

/* Exercise images */
.ex-img-wrap{margin-top:8px;position:relative;display:inline-block}
.ex-img{max-width:100%;max-height:180px;border-radius:8px;border:1px solid #1a1a1a;display:block}
.ex-img-del{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:12px;background:rgba(0,0,0,.8);border:1px solid #333;color:#999;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.ex-img-btn{display:inline-flex;align-items:center;gap:4px;background:#080808;border:1px solid #1a1a1a;border-radius:8px;padding:5px 10px;color:#5a5549;font-size:11px;cursor:pointer;margin-top:6px;transition:all 0.2s;font-weight:500;font-family:inherit}
.ex-img-btn:active{border-color:#d4a054;color:#d4a054}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #111;display:flex;z-index:20;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
.tab-bar .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 7px;cursor:pointer;border:none;background:none;color:#2a2520;font-size:9px;gap:3px;transition:color 0.2s;letter-spacing:0.04em;font-weight:600;text-transform:uppercase;font-family:inherit}
.tab-bar .tab.active{color:#d4a054}
.tab-bar .tab .tab-icon{font-size:20px}

/* removed chart css */

/* Training */
.workout-title{font-size:24px;font-weight:800;margin:20px 16px 4px;color:#d4a054;letter-spacing:-0.5px}
.workout-subtitle{font-size:12px;color:#3d3830;margin:0 16px 14px;font-weight:500;letter-spacing:0.02em}
.ex-card{background:#0c0c0c;border:1px solid #161616;border-radius:12px;padding:14px;margin:0 16px 8px;position:relative;transition:border-color 0.2s}
.ex-card.done{opacity:0.35;border-color:#0a0a0a}
.ex-name{font-weight:700;font-size:14px;margin-bottom:4px;color:#e8e4de;letter-spacing:0.01em}
.ex-detail{font-size:12px;color:#5a5549;margin-bottom:2px}
.ex-kg{font-size:12px;color:#c8c2b8;cursor:pointer;display:inline-flex;align-items:center;gap:4px;background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:3px 10px;transition:all 0.2s}
.ex-kg:active{border-color:#d4a054}
.ex-kg-edit{display:inline-flex;align-items:center;gap:4px}
.ex-kg-edit .input{width:90px;padding:4px 8px;font-size:13px}
.ex-kg-edit .confirm{background:none;border:none;color:#d4a054;cursor:pointer;font-size:14px;padding:2px}
.ex-kg-edit .cancel{background:none;border:none;color:#3d3830;cursor:pointer;font-size:14px;padding:2px}
.ex-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ex-left{flex:1}
.ex-check{width:38px;height:38px;border-radius:50%;border:2px solid #1a1a1a;background:none;color:#2a2520;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.25s}
.ex-check.checked{background:#d4a054;border-color:#d4a054;color:#000;box-shadow:0 2px 12px #d4a05440}
.rest-btn{display:inline-flex;align-items:center;gap:4px;background:#080808;border:1px solid #1a1a1a;border-radius:8px;padding:5px 10px;color:#5a5549;font-size:11px;cursor:pointer;margin-top:6px;transition:all 0.2s;font-weight:500}
.rest-btn:active{border-color:#d4a054;color:#d4a054}
.rest-btn.active{border-color:#d4a054;color:#d4a054}

/* Timer */
.timer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.timer-ring{position:relative;width:240px;height:240px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .time-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}

/* Progression */
.prog-note{background:#0a0a0a;border-left:2px solid #d4a054;border-radius:0 10px 10px 0;padding:13px 16px;margin:18px 16px 8px;font-size:12px;color:#4a4540;line-height:1.6}
.prog-note strong{color:#a09888;font-weight:600}

/* Rest day */
.rest-day-msg{text-align:center;padding:80px 32px;color:#3d3830}
.rest-day-msg .icon{font-size:48px;margin-bottom:16px}
.rest-day-msg .title{font-size:20px;font-weight:700;color:#e8e4de;margin-bottom:8px;letter-spacing:-0.3px}

/* Hold badge */
.hold-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 9px;border-radius:6px;cursor:pointer;border:none;margin-top:4px;font-weight:600;letter-spacing:0.02em;transition:all 0.2s}
.hold-badge.holding{background:#d4a05412;color:#d4a054;border:1px solid #d4a05425}
.hold-badge.ready{background:#22c55e0c;color:#22c55e;border:1px solid #22c55e20}
.complete-btn{display:block;margin:20px 16px;padding:16px;width:calc(100% - 32px);background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.02em;box-shadow:0 2px 12px #22c55e20;transition:all 0.2s}
.complete-btn:active{transform:scale(0.97);opacity:0.85}
.workout-picker-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
.workout-picker{background:#0c0c0c;border:1px solid #1a1a1a;border-radius:16px;padding:20px;width:100%;max-width:360px}
.workout-picker h3{color:#e8e4de;font-size:15px;margin-bottom:14px;text-align:center;font-weight:700;letter-spacing:0.02em}
.wp-option{display:flex;align-items:center;justify-content:space-between;padding:12px;border:1px solid #161616;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all 0.2s;background:#080808}
.wp-option:active,.wp-option.current{border-color:#d4a054;background:#d4a05408}
.wp-option .wp-name{font-weight:600;font-size:13px;color:#e8e4de}
.wp-option .wp-tag{font-size:11px;color:#5a5549}
.wp-option.current .wp-name{color:#d4a054}
.workout-nav{display:flex;align-items:center;gap:8px;margin:0 16px 4px}
.workout-nav-btn{background:none;border:none;color:#5a5549;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.04em;padding:4px 8px;border-radius:6px;border:1px solid #161616;transition:all 0.2s;font-family:inherit}
.workout-nav-btn:active{border-color:#d4a054;color:#d4a054}
.last-trained{font-size:11px;color:#3d3830;margin:0 16px 12px;font-weight:500}
</style>
</head>
